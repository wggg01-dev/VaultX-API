kind = "web"
previewPath = "/"
title = "Metrix"
version = "1.0.0"
id = "artifacts/metrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21521

[services.development]
run = "pnpm --filter @workspace/metrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/metrix", "run", "build" ]
publicDir = "artifacts/metrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21521"
BASE_PATH = "/"
