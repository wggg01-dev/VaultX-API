kind = "web"
previewPath = "/vaultx/"
title = "VaultX API"
version = "1.0.0"
id = "artifacts/vaultx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/vaultx/" ]
localPort = 19089

[services.development]
run = "pnpm --filter @workspace/vaultx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vaultx", "run", "build" ]
publicDir = "artifacts/vaultx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19089"
BASE_PATH = "/vaultx/"
